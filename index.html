<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation ???</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #f0ead6;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 12px;
  }

  .header h1 {
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 10px;
  }

  .header .subtitle {
    color: #555;
    font-size: 0.75rem;
    margin-top: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Departures board ── */
  .board {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    background: #0d0d0d;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 10px 14px;
    margin: 4px 0 6px;
  }

  .flap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 42px;
    background: #111;
    border-radius: 5px;
    border: 1px solid #1a1a1a;
    overflow: hidden;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }

  .flap::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 1px;
    background: rgba(0,0,0,0.5);
    z-index: 2;
  }

  .flap-char {
    font-family: 'Courier New', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1;
    color: #f0ead6;
    transition: none;
    user-select: none;
  }

  .flap.spinning .flap-char {
    animation: flapSpin 0.08s steps(1) infinite;
  }

  .flap.settling .flap-char {
    animation: flapSettle 0.06s steps(1) 3;
  }

  .flap.locked .flap-char {
    color: #c9a96e;
    text-shadow: 0 0 12px rgba(201,169,110,0.5);
    animation: none;
  }

  .flap-space {
    width: 10px;
  }

  @keyframes flapSpin {
    0%   { opacity: 1; }
    50%  { opacity: 0.3; }
    100% { opacity: 1; }
  }

  @keyframes flapSettle {
    0%   { transform: scaleY(1); opacity: 1; }
    40%  { transform: scaleY(0.1); opacity: 0.4; }
    100% { transform: scaleY(1); opacity: 1; }
  }

  .board-label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: #333;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .card {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  .progress-section .label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress-bar-outer {
    background: #222;
    border-radius: 99px;
    height: 18px;
    overflow: hidden;
    position: relative;
  }

  .progress-bar-inner {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #c9a96e, #e8c88a);
    transition: width 1s linear;
    position: relative;
    min-width: 0;
  }

  .progress-bar-inner::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    border-radius: 0 99px 99px 0;
  }

  .progress-pct {
    text-align: center;
    font-size: 2.6rem;
    font-weight: 700;
    color: #c9a96e;
    margin-top: 12px;
    line-height: 1;
  }

  .progress-pct span {
    font-size: 1.1rem;
    color: #888;
    font-weight: 400;
  }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin-bottom: 10px;
  }

  .current-activity {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .activity-icon {
    font-size: 2rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .activity-time {
    font-size: 0.75rem;
    color: #c9a96e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .activity-name {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: #f0ead6;
  }

  .activity-cryptic {
    font-size: 0.85rem;
    color: #999;
    font-style: italic;
    line-height: 1.5;
  }

  .next-card {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .next-icon {
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .next-info .next-label {
    font-size: 0.7rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .next-info .next-name {
    font-size: 1rem;
    font-weight: 600;
    color: #f0ead6;
    margin: 2px 0;
  }

  .next-info .next-time {
    font-size: 0.8rem;
    color: #888;
  }

  .countdown-card {
    text-align: center;
  }

  .countdown-display {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 8px;
  }

  .countdown-unit {
    background: #1e1e1e;
    border-radius: 10px;
    padding: 12px 10px;
    min-width: 64px;
  }

  .countdown-num {
    font-size: 1.8rem;
    font-weight: 700;
    color: #c9a96e;
    line-height: 1;
  }

  .countdown-label {
    font-size: 0.65rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .done-card {
    text-align: center;
    padding: 40px 20px;
  }

  .done-emoji {
    font-size: 3.5rem;
    display: block;
    margin-bottom: 12px;
  }

  .done-card h2 {
    font-size: 1.5rem;
    color: #c9a96e;
    margin-bottom: 8px;
  }

  .done-card p {
    color: #888;
    font-size: 0.9rem;
  }

  .not-started-card {
    text-align: center;
    padding: 30px 20px;
  }

  .not-started-card .big-emoji {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
  }

  .not-started-card h2 {
    font-size: 1.3rem;
    color: #c9a96e;
    margin-bottom: 8px;
  }

  .footer {
    color: #444;
    font-size: 0.75rem;
    text-align: center;
    margin-top: 8px;
  }

  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .divider {
    height: 1px;
    background: #2a2a2a;
    margin: 16px 0;
  }
</style>
</head>
<body>

<div class="header">
  <h1>✈️ &nbsp;Operation</h1>
  <div class="board-label">Destination</div>
  <div class="board" id="board"></div>
  <div class="subtitle" id="subtitle">Gabi's Stag Do · June 2026</div>
</div>

<div id="app"></div>

<div class="footer" id="clock"></div>

<script>
// ─── SPLIT-FLAP BOARD ────────────────────────────────────────────────────────
const REVEAL_TIME = new Date('2026-06-19T07:00:00Z'); // 08:00 BST
const DESTINATION  = 'MARRAKESH';
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

const DECOY_CITIES = [
  'TOKYO','REYKJAVIK','NAIROBI','OSLO','BANGKOK','LISBON','HELSINKI',
  'KATHMANDU','LAGOS','HAVANA','TBILISI','LIMA','VILNIUS','QUITO',
  'TALLINN','COLOMBO','BISHKEK','WINDHOEK','YEREVAN','ACCRA','MONTEVIDEO',
  'TASHKENT','MINSK','NASSAU','DUSHANBE','NIAMEY','SEOUL','CARACAS',
  'VIENNA','PORTO','RIGA','ZAGREB','LUANDA','DAKAR','BAKU','ALMATY',
  'MUSCAT','BEIRUT','AMMAN','TUNIS','LOMÉ','CONAKRY','BAMAKO',
  'COPENHAGEN','WARSAW','PRAGUE','BUDAPEST','ATHENS','VALLETTA',
  'DUBROVNIK','ASHGABAT','KABUL','DHAKA','BRUSSELS','STOCKHOLM',
  'AMSTERDAM','SINGAPORE','DUBAI','ISTANBUL','CASABLANCA','CAIRO',
  'JOHANNESBURG','LAGOS','ACCRA','ADDIS ABABA','NAIROBI','KAMPALA',
];

const BOARD_SIZE = 9; // length of 'MARRAKESH'
let flaps = []; // {el, charEl, target, current, spinning}
let cityIndex = 0;
let revealed = false;
let boardInterval = null;

function buildBoard() {
  const board = document.getElementById('board');
  if (!board) return;
  board.innerHTML = '';
  flaps = [];
  for (let i = 0; i < BOARD_SIZE; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'flap spinning';
    const ch = document.createElement('span');
    ch.className = 'flap-char';
    ch.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
    wrap.appendChild(ch);
    board.appendChild(wrap);
    flaps.push({ el: wrap, charEl: ch });
  }
}

function setBoard(word, lock = false) {
  const padded = word.toUpperCase().padEnd(BOARD_SIZE, ' ').slice(0, BOARD_SIZE);
  for (let i = 0; i < BOARD_SIZE; i++) {
    const f = flaps[i];
    if (!f) continue;
    const ch = padded[i];
    f.charEl.textContent = ch === ' ' ? ' ' : ch;
    if (lock) {
      f.el.className = 'flap locked';
    } else {
      f.el.className = 'flap spinning';
    }
  }
}

function tickBoard() {
  const now = new Date();

  if (now >= REVEAL_TIME) {
    if (!revealed) {
      revealed = true;
      if (boardInterval) { clearInterval(boardInterval); boardInterval = null; }
      // Settle each letter one by one with a stagger
      for (let i = 0; i < BOARD_SIZE; i++) {
        const f = flaps[i];
        const targetChar = DESTINATION[i];
        setTimeout(() => {
          f.el.className = 'flap settling';
          f.charEl.textContent = targetChar;
          setTimeout(() => {
            f.el.className = 'flap locked';
          }, 300);
        }, i * 120);
      }
      setTimeout(() => {
        document.title = 'Operation Marrakesh 🐪';
        const subtitle = document.getElementById('subtitle');
        if (subtitle) subtitle.textContent = "Gabi's Stag Do · June 2026";
      }, BOARD_SIZE * 120 + 300);
    }
    return;
  }

  // Randomly scramble some flaps each tick for noise
  flaps.forEach(f => {
    if (Math.random() > 0.4) {
      f.charEl.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
    }
  });

  // Every ~600ms show a real city name through the noise
  if (cityIndex % 5 === 0) {
    const city = DECOY_CITIES[Math.floor(cityIndex / 5) % DECOY_CITIES.length];
    setBoard(city, false);
  }

  cityIndex++;
  document.title = 'Operation ??? ✈️';
  const subtitle = document.getElementById('subtitle');
  if (subtitle) subtitle.textContent = "Gabi's Stag Do · Destination: CLASSIFIED";
}

buildBoard();
if (new Date() >= REVEAL_TIME) {
  // Already past reveal — show immediately
  revealed = true;
  setBoard(DESTINATION, true);
  document.title = 'Operation Marrakesh 🐪';
} else {
  boardInterval = setInterval(tickBoard, 120);
  tickBoard();
}

// ─── ITINERARY ────────────────────────────────────────────────────────────────
// All times in LOCAL time at the activity location.
// BST = UTC+1, Morocco = UTC+1 in summer (same as BST)
// So we store as UTC offsets explicitly.

const EVENTS = [
  {
    id: 'pickup_eli',
    start: new Date('2026-06-19T05:30:00Z'), // 06:30 BST
    end:   new Date('2026-06-19T05:35:00Z'),
    icon: '🚗',
    name: 'Agent Eli: Acquired',
    cryptic: 'The first operative is extracted from the northern suburbs. The mission clock begins.',
  },
  {
    id: 'pickup_richard',
    start: new Date('2026-06-19T05:35:00Z'), // 06:35 BST
    end:   new Date('2026-06-19T05:45:00Z'),
    icon: '🚗',
    name: 'Agent Richard: Acquired',
    cryptic: 'Holly Park surrenders its finest. The convoy grows. Holly Park weeps quietly.',
  },
  {
    id: 'pickup_gabi',
    start: new Date('2026-06-19T05:45:00Z'), // 06:45 BST
    end:   new Date('2026-06-19T07:00:00Z'),
    icon: '🎉',
    name: 'The Man of the Hour: Acquired',
    cryptic: 'Willifield Way releases its greatest treasure. The stag is in the vehicle. The mission is live.',
  },
  {
    id: 'stansted_drop',
    start: new Date('2026-06-19T07:00:00Z'), // 08:00 BST
    end:   new Date('2026-06-19T08:55:00Z'),
    icon: '🅿️',
    name: 'Parking: Red Zone Secured',
    cryptic: 'The chariot is surrendered to the concrete wasteland of the Red Zone. Check-in commences. Bags are weighed with suspicious enthusiasm.',
  },
  {
    id: 'flight_out',
    start: new Date('2026-06-19T08:55:00Z'), // 09:55 BST
    end:   new Date('2026-06-19T12:35:00Z'), // 13:35 BST
    icon: '✈️',
    name: 'Airborne: RK7870',
    cryptic: 'A steel tube defies gravity at 35,000 feet. Somewhere over France, someone orders a Bloody Mary. The Atlas Mountains await.',
  },
  {
    id: 'marrakesh_arrival',
    start: new Date('2026-06-19T12:35:00Z'), // 13:35 BST / 13:35 Morocco time
    end:   new Date('2026-06-20T06:00:00Z'),
    icon: '🌅',
    name: 'Marrakesh: We Have Landed',
    cryptic: 'The souks breathe. The spice markets hum. The riad awaits. The stag has entered the medina — and the medina has no idea what\'s coming.',
  },
  {
    id: 'marrakesh_day',
    start: new Date('2026-06-20T06:00:00Z'),
    end:   new Date('2026-06-21T17:45:00Z'), // 18:45 Morocco time = departure minus buffer
    icon: '🏜️',
    name: 'Full Day in Marrakesh',
    cryptic: 'Somewhere between the hammam, the rooftop, the camel, and whatever happened at that mint tea situation — legends are being made. Classified.',
  },
  {
    id: 'return_flight',
    start: new Date('2026-06-21T17:45:00Z'), // 18:45 Morocco = 19:45? Wait, flight is 19:45 BST...
    // Morocco is UTC+1 in summer, same as BST. So 19:45 BST = 18:45 UTC
    // Let me recalculate: 19:45 BST = 18:45 UTC
    end:   new Date('2026-06-21T22:20:00Z'), // 23:20 BST = 22:20 UTC
    icon: '✈️',
    name: 'Homeward: RK7869',
    cryptic: 'The empire strikes back. The sky ferries its cargo north. Desert dust settles on carry-on luggage. Reality approaches at 500 knots.',
  },
  {
    id: 'landing',
    start: new Date('2026-06-21T22:20:00Z'), // 23:20 BST
    end:   new Date('2026-06-21T23:59:00Z'),
    icon: '🏠',
    name: 'Back on British Soil',
    cryptic: 'Stansted receives its prodigal sons. Cold air. Queues. The memory of warmth. The stag is safely returned — slightly sandier than when he left.',
  },
];

const TRIP_START = EVENTS[0].start;
const TRIP_END   = EVENTS[EVENTS.length - 1].end;

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

function formatDuration(ms) {
  if (ms <= 0) return '00:00:00';
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${pad(h)}:${pad(m)}:${pad(sec)}`;
}

function fmtLocalTime(date) {
  return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function fmtLocalDateTime(date) {
  return date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })
    + ' ' + fmtLocalTime(date);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render() {
  const now = new Date();
  const app = document.getElementById('app');
  const clockEl = document.getElementById('clock');

  clockEl.textContent = 'Updated ' + now.toLocaleTimeString('en-GB');

  // Before trip
  if (now < TRIP_START) {
    const ms = TRIP_START - now;
    const totalSecs = Math.floor(ms / 1000);
    const h = Math.floor(totalSecs / 3600);
    const m = Math.floor((totalSecs % 3600) / 60);
    const s = totalSecs % 60;

    app.innerHTML = `
      <div class="card not-started-card">
        <span class="big-emoji">🐪</span>
        <h2>Mission: Not Yet Launched</h2>
        <p style="margin-bottom:20px;color:#888;">The stag do hasn't started yet. Hold tight.</p>
        <div class="countdown-display">
          <div class="countdown-unit"><div class="countdown-num">${pad(h)}</div><div class="countdown-label">Hours</div></div>
          <div class="countdown-unit"><div class="countdown-num">${pad(m)}</div><div class="countdown-label">Mins</div></div>
          <div class="countdown-unit"><div class="countdown-num">${pad(s)}</div><div class="countdown-label">Secs</div></div>
        </div>
        <p style="margin-top:16px;color:#666;font-size:0.8rem;">until pickup begins · Fri 19 Jun 06:30</p>
      </div>
    `;
    return;
  }

  // After trip
  if (now >= TRIP_END) {
    app.innerHTML = `
      <div class="card done-card">
        <span class="done-emoji">🏆</span>
        <h2>Mission Complete</h2>
        <p>Gabi's Marrakesh stag do is officially in the history books.</p>
        <p style="margin-top:8px;color:#c9a96e;font-style:italic;">What happens in the medina, stays in the medina.</p>
      </div>
    `;
    return;
  }

  // During trip
  const totalMs = TRIP_END - TRIP_START;
  const elapsedMs = now - TRIP_START;
  const pct = Math.min(100, Math.max(0, (elapsedMs / totalMs) * 100));

  // Find current event
  let currentEvent = null;
  let nextEvent = null;

  for (let i = 0; i < EVENTS.length; i++) {
    const e = EVENTS[i];
    if (now >= e.start && now < e.end) {
      currentEvent = e;
      nextEvent = EVENTS[i + 1] || null;
      break;
    }
    if (now < e.start) {
      // Between events — treat the next one as upcoming
      nextEvent = e;
      currentEvent = EVENTS[i - 1] || null;
      break;
    }
  }

  if (!currentEvent && !nextEvent) {
    currentEvent = EVENTS[EVENTS.length - 1];
  }

  // Countdown to next event
  let countdownHtml = '';
  if (nextEvent) {
    const msToNext = nextEvent.start - now;
    const ts = Math.max(0, Math.floor(msToNext / 1000));
    const th = Math.floor(ts / 3600);
    const tm = Math.floor((ts % 3600) / 60);
    const tsec = ts % 60;
    countdownHtml = `
      <div class="card countdown-card">
        <div class="section-title">⏱ Countdown to Next</div>
        <div class="countdown-display">
          <div class="countdown-unit"><div class="countdown-num">${pad(th)}</div><div class="countdown-label">Hours</div></div>
          <div class="countdown-unit"><div class="countdown-num">${pad(tm)}</div><div class="countdown-label">Mins</div></div>
          <div class="countdown-unit"><div class="countdown-num">${pad(tsec)}</div><div class="countdown-label">Secs</div></div>
        </div>
      </div>
    `;
  }

  const nextHtml = nextEvent ? `
    <div class="card">
      <div class="section-title">Coming Up</div>
      <div class="next-card">
        <div class="next-icon">${nextEvent.icon}</div>
        <div class="next-info">
          <div class="next-label">Next</div>
          <div class="next-name">${nextEvent.name}</div>
          <div class="next-time">${fmtLocalDateTime(nextEvent.start)}</div>
        </div>
      </div>
    </div>
  ` : '';

  const currentHtml = currentEvent ? `
    <div class="card">
      <div class="section-title">🔴 <span class="pulse">Happening Now</span></div>
      <div class="current-activity">
        <div class="activity-icon">${currentEvent.icon}</div>
        <div>
          <div class="activity-time">${fmtLocalTime(currentEvent.start)} – ${fmtLocalTime(currentEvent.end)}</div>
          <div class="activity-name">${currentEvent.name}</div>
          <div class="activity-cryptic">${currentEvent.cryptic}</div>
        </div>
      </div>
    </div>
  ` : '';

  app.innerHTML = `
    <div class="card progress-section">
      <div class="label"><span>Mission Start</span><span>Mission End</span></div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" style="width:${pct.toFixed(2)}%"></div>
      </div>
      <div class="progress-pct">${pct.toFixed(1)}<span>%</span></div>
    </div>

    ${currentHtml}
    ${nextHtml}
    ${countdownHtml}
  `;
}

render();
setInterval(render, 1000);
</script>
</body>
</html>
