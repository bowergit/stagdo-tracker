<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Operation ???</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a96e;
  --gold-bright: #e8c88a;
  --gold-dim: #7a5d2e;
  --bg: #080808;
  --surface: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #f0ead6;
  --muted: #555;
}

html { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ambient glow */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 100vw;
  height: 60vh;
  background: radial-gradient(ellipse at center top, rgba(201,169,110,0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ━━━━ HERO (top ~50%) ━━━━ */
.hero {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 16px;
  position: relative;
  z-index: 1;
  gap: 6px;
}

.op-label {
  font-size: 0.6rem;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.big-emoji {
  font-size: clamp(4rem, 18vw, 6rem);
  line-height: 1;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  display: block;
  text-align: center;
  margin: 4px 0 2px;
  filter: drop-shadow(0 4px 16px rgba(201,169,110,0.2));
}

.big-emoji.pop {
  transform: scale(1.25) rotate(-8deg);
}

/* ── Board ── */
.board-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: fit-content;
  max-width: 92vw;
}

.board-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 10px 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: box-shadow 0.6s ease, border-color 0.6s ease;
  min-height: 66px;
  width: fit-content;
}

.board-row.revealed {
  box-shadow: 0 8px 40px rgba(201,169,110,0.2), 0 0 80px rgba(201,169,110,0.08);
  border-color: rgba(201,169,110,0.25);
}

.board-dest-label {
  font-size: 0.55rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
  text-align: center;
  margin-bottom: 2px;
}

.board-tiles {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 4px;
  align-items: center;
}

.tile {
  width: clamp(28px, 7.5vw, 38px);
  height: clamp(44px, 11vw, 56px);
  background: #101010;
  border-radius: 7px;
  border: 1px solid #1c1c1c;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 -2px 5px rgba(0,0,0,0.5);
  transition: border-color 0.4s, box-shadow 0.4s;
}

.tile::after {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 1px;
  background: rgba(0,0,0,0.55);
  pointer-events: none;
}

.tile-char {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.2rem, 4.5vw, 1.6rem);
  font-weight: 700;
  color: #e0d8c8;
  line-height: 1;
  transition: color 0.4s ease;
}

.tile.scrambling .tile-char { color: #2a2a2a; }

.tile.locked {
  border-color: rgba(201,169,110,0.25);
  box-shadow: inset 0 -2px 5px rgba(0,0,0,0.5), 0 0 12px rgba(201,169,110,0.15);
}

.tile.locked .tile-char {
  color: var(--gold);
  text-shadow: 0 0 20px rgba(201,169,110,0.6);
}

.board-sub {
  font-size: 0.6rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}

/* ━━━━ DIVIDER ━━━━ */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  flex-shrink: 0;
  margin: 0 16px;
}

/* ━━━━ STATUS (bottom ~50%) ━━━━ */
.status {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 12px 14px 16px;
  gap: 10px;
  position: relative;
  z-index: 1;
}

/* Progress row */
.prog-row {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.prog-pct {
  font-size: clamp(2.4rem, 11vw, 3.6rem);
  font-weight: 900;
  letter-spacing: -3px;
  color: var(--text);
  line-height: 1;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.prog-pct sup {
  font-size: 0.4em;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0;
  vertical-align: super;
}

.prog-bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.prog-track {
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  position: relative;
  overflow: visible;
}

.prog-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-bright));
  position: relative;
  transition: width 2s cubic-bezier(0.4,0,0.2,1);
  min-width: 8px;
}

.prog-fill::after {
  content: '';
  position: absolute;
  right: -1px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gold-bright);
  box-shadow: 0 0 12px rgba(201,169,110,0.9), 0 0 28px rgba(201,169,110,0.4);
}

.prog-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* Current + next cards */
.cards-row {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  min-height: 0;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  position: relative;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.card-tag {
  font-size: 0.55rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
}

.live-dot {
  width: 5px; height: 5px;
  background: var(--gold);
  border-radius: 50%;
  flex-shrink: 0;
  animation: blink 1.8s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.card-icon { font-size: 1.6rem; line-height: 1; margin-bottom: 6px; flex-shrink: 0; }

.card-name {
  font-size: clamp(0.75rem, 2.8vw, 0.9rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 4px;
  flex-shrink: 0;
}

.card-time {
  font-size: 0.62rem;
  color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 6px;
  flex-shrink: 0;
}

.card-cryptic {
  font-size: 0.7rem;
  color: #666;
  line-height: 1.5;
  font-style: italic;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
}

/* Countdown card spans full width */
.countdown-card {
  grid-column: 1 / -1;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  flex: 0 0 auto;
}

.cd-label {
  font-size: 0.58rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  flex-shrink: 0;
  writing-mode: initial;
}

.cd-nums {
  display: flex;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.cd-unit {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.05);
  padding: 8px 4px 6px;
  text-align: center;
}

.cd-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.4rem, 6vw, 2rem);
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}

.cd-lbl {
  font-size: 0.5rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 3px;
}

/* Pre-trip / post-trip fullscreen */
.full-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 20px;
  position: relative;
  z-index: 1;
}

.pre-label {
  font-size: 0.65rem;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--muted);
}

.pre-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(3rem, 16vw, 5rem);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: -4px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.pre-hint {
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-align: center;
}

/* ━━━━ QUOTE STRIP ━━━━ */
.quote-strip {
  flex: 0 0 auto;
  padding: 10px 20px;
  text-align: center;
  position: relative;
  z-index: 1;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.quote-text {
  font-size: clamp(0.78rem, 3.2vw, 0.92rem);
  color: #888;
  font-style: italic;
  line-height: 1.4;
  transition: opacity 0.5s ease;
  max-width: 340px;
}

.quote-text.hidden { opacity: 0; }

.quote-text .part2 {
  color: var(--gold);
  font-style: normal;
  font-weight: 600;
}

.footer {
  position: fixed;
  bottom: 8px;
  left: 0; right: 0;
  text-align: center;
  font-size: 0.55rem;
  color: #222;
  letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 0;
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="op-label">✈ &nbsp;Operation</div>
  <div class="big-emoji" id="emoji">🐪</div>
  <div class="board-wrap">
    <div class="board-dest-label" id="boardSub">Destination</div>
    <div class="board-row" id="boardRow">
      <div class="board-tiles" id="boardTiles"></div>
    </div>
  </div>
  <div style="font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:#444;margin-top:2px;">Gabi's Stag Do · June 2026</div>
</div>

<div class="divider"></div>

<!-- Quote strip -->
<div class="quote-strip">
  <div class="quote-text" id="quoteEl"></div>
</div>

<div class="divider"></div>

<!-- Status (injected) -->
<div id="statusArea"></div>

<div class="footer" id="footer"></div>

<script>
// ━━━ CONFIG ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const REVEAL_TIME = new Date('2026-06-19T07:00:00Z'); // 08:00 BST
const DESTINATION = 'MARRAKESH';
const HOLD_MS     = 3400;
const SCRAMBLE_MS = 650;

const EMOJIS = ['🐪','🍆','🍺','🍹','🌴','☀️','🕺','🎉','🥂','🔥','🌶️','💃','🏖️','🍸','🎊','👙','🎶','🏜️'];

const CITIES = [
  'PARIS','MADRID','ROME','BERLIN','AMSTERDAM','LISBON','VIENNA',
  'PRAGUE','WARSAW','BUDAPEST','ATHENS','STOCKHOLM','COPENHAGEN',
  'OSLO','HELSINKI','DUBLIN','ZURICH','BARCELONA','MILAN','ISTANBUL',
  'CASABLANCA','REYKJAVIK','BRUSSELS','EDINBURGH','RIGA','TALLINN',
  'VILNIUS','BUCHAREST','SOFIA','BELGRADE','ZAGREB','VALLETTA',
  'NICOSIA','TEL AVIV','CAIRO','TUNIS','ALGIERS','GENEVA','MUNICH',
  'FRANKFURT','NOTTINGHAM','CHABAD',
];

const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

// ━━━ BOARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let tiles = [];
let cityIndex = Math.floor(Math.random() * CITIES.length);
let emojiIndex = 0;
let revealed = false;
let phaseTimer = null;
let scrambleRAF = null;
let scrambleStart = null;

function rc() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }

function buildTiles(word) {
  const row = document.getElementById('boardTiles');
  row.innerHTML = '';
  tiles = [];
  for (let i = 0; i < word.length; i++) {
    if (word[i] === ' ') {
      const sp = document.createElement('div');
      sp.style.width = '8px';
      row.appendChild(sp);
      tiles.push(null); // space marker
      continue;
    }
    const t = document.createElement('div');
    t.className = 'tile';
    const c = document.createElement('span');
    c.className = 'tile-char';
    c.textContent = word[i];
    t.appendChild(c);
    row.appendChild(t);
    tiles.push({ el: t, charEl: c });
  }
}

function showCity(city) {
  buildTiles(city);
  // Emoji pop animation
  const e = document.getElementById('emoji');
  const newEmoji = EMOJIS[emojiIndex % EMOJIS.length];
  e.textContent = newEmoji;
  e.classList.remove('pop');
  requestAnimationFrame(() => requestAnimationFrame(() => e.classList.add('pop')));
  setTimeout(() => e.classList.remove('pop'), 400);
  emojiIndex++;
}

function scrambleTick(progress) {
  tiles.forEach(t => {
    if (!t) return;
    if (Math.random() > progress * 0.5) {
      t.el.className = 'tile scrambling';
      t.charEl.textContent = rc();
    }
  });
}

function startScramble(cb) {
  scrambleStart = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - scrambleStart) / SCRAMBLE_MS);
    scrambleTick(p);
    if (p < 1) { scrambleRAF = requestAnimationFrame(frame); }
    else { scrambleRAF = null; cb(); }
  }
  scrambleRAF = requestAnimationFrame(frame);
}

function nextCity() {
  cityIndex = (cityIndex + 1) % CITIES.length;
  showCity(CITIES[cityIndex]);
  phaseTimer = setTimeout(() => startScramble(nextCity), HOLD_MS);
}

function revealDestination() {
  if (revealed) return;
  revealed = true;
  clearTimeout(phaseTimer);
  if (scrambleRAF) cancelAnimationFrame(scrambleRAF);

  // Rush scramble then settle letter by letter
  let n = 0;
  const rush = setInterval(() => {
    buildTiles(DESTINATION); // rebuild to exact length
    tiles.forEach(t => { if (t) { t.el.className='tile scrambling'; t.charEl.textContent=rc(); }});
    if (++n >= 14) {
      clearInterval(rush);
      for (let i = 0; i < DESTINATION.length; i++) {
        setTimeout(() => {
          if (!tiles[i]) return;
          tiles[i].charEl.textContent = DESTINATION[i];
          tiles[i].el.className = 'tile';
          setTimeout(() => { tiles[i].el.className = 'tile locked'; }, 80);
        }, i * 110);
      }
      setTimeout(() => {
        document.getElementById('boardRow').classList.add('revealed');
        document.getElementById('boardSub').textContent = 'Destination';
        document.getElementById('emoji').textContent = '🐪';
        document.title = 'Operation Marrakesh 🐪';
      }, DESTINATION.length * 110 + 250);
    }
  }, 55);
}

// ━━━ ITINERARY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const EVENTS = [
  { start: new Date('2026-06-19T05:30:00Z'), end: new Date('2026-06-19T05:35:00Z'),
    icon:'🚗', name:'Agent Eli: Acquired',
    cryptic:'The first operative extracted from the northern suburbs. The mission clock begins.' },
  { start: new Date('2026-06-19T05:35:00Z'), end: new Date('2026-06-19T05:45:00Z'),
    icon:'🚗', name:'Agent Richard: Acquired',
    cryptic:'Holly Park surrenders its finest. The convoy grows in size and ambition.' },
  { start: new Date('2026-06-19T05:45:00Z'), end: new Date('2026-06-19T07:00:00Z'),
    icon:'🎉', name:'The Man of the Hour',
    cryptic:'Willifield Way releases its greatest treasure. The stag is in the vehicle. Mission live.' },
  { start: new Date('2026-06-19T07:00:00Z'), end: new Date('2026-06-19T08:55:00Z'),
    icon:'🅿️', name:'Red Zone: Secured',
    cryptic:'The chariot surrendered to the concrete wasteland. Check-in begins. Bags weighed with suspicious enthusiasm.' },
  { start: new Date('2026-06-19T08:55:00Z'), end: new Date('2026-06-19T12:35:00Z'),
    icon:'✈️', name:'Airborne: RK7870',
    cryptic:'35,000 feet. Somewhere over France someone orders a Bloody Mary. The Atlas Mountains await.' },
  { start: new Date('2026-06-19T12:35:00Z'), end: new Date('2026-06-20T06:00:00Z'),
    icon:'🌅', name:'Marrakesh: Landed',
    cryptic:'The souks breathe. The spice markets hum. The riad awaits. The medina has no idea what\'s coming.' },
  { start: new Date('2026-06-20T06:00:00Z'), end: new Date('2026-06-21T17:45:00Z'),
    icon:'🏜️', name:'Full Day: Marrakesh',
    cryptic:'Between the hammam, the rooftop, and whatever happened at that mint tea situation — legends are being made.' },
  { start: new Date('2026-06-21T17:45:00Z'), end: new Date('2026-06-21T22:20:00Z'),
    icon:'✈️', name:'Homeward: RK7869',
    cryptic:'The sky ferries its cargo north. Desert dust on carry-on luggage. Reality at 500 knots.' },
  { start: new Date('2026-06-21T22:20:00Z'), end: new Date('2026-06-21T23:59:00Z'),
    icon:'🏠', name:'Back on British Soil',
    cryptic:'Stansted receives its prodigal sons. Cold air. Queues. The memory of warmth.' },
];

const TRIP_START = EVENTS[0].start;
const TRIP_END   = EVENTS[EVENTS.length - 1].end;

function pad(n) { return String(Math.floor(Math.abs(n))).padStart(2,'0'); }
function fmtTime(d) { return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false}); }
function fmtShort(d) { return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+' '+fmtTime(d); }

// ━━━ RENDER STATUS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderStatus() {
  const now = new Date();
  const area = document.getElementById('statusArea');
  document.getElementById('footer').textContent = 'Live · ' + now.toLocaleTimeString('en-GB');

  if (now < TRIP_START) {
    const s   = Math.max(0, Math.floor((TRIP_START - now) / 1000));
    const h   = Math.floor(s / 3600);
    const m   = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    area.innerHTML = `
      <div class="full-state">
        <div class="pre-label">T-minus</div>
        <div class="pre-time">${pad(h)}<span style="font-size:.45em;color:var(--muted)">h</span>${pad(m)}<span style="font-size:.45em;color:var(--muted)">m</span>${pad(sec)}<span style="font-size:.45em;color:var(--muted)">s</span></div>
        <div class="pre-hint">Until pickup begins · Fri 19 Jun 06:30 BST</div>
      </div>`;
    return;
  }

  if (now >= TRIP_END) {
    area.innerHTML = `
      <div class="full-state">
        <div style="font-size:3.5rem">🏆</div>
        <div style="font-size:1.4rem;font-weight:800;color:var(--gold)">Mission Complete</div>
        <div style="font-size:.85rem;color:var(--muted);text-align:center;line-height:1.6">Gabi's Marrakesh stag do is officially in the history books.<br><br><span style="color:var(--gold);font-style:italic">What happens in the medina, stays in the medina.</span></div>
      </div>`;
    return;
  }

  const pct = Math.min(100, Math.max(0, (now - TRIP_START) / (TRIP_END - TRIP_START) * 100));

  let curr = null, next = null;
  for (let i = 0; i < EVENTS.length; i++) {
    const e = EVENTS[i];
    if (now >= e.start && now < e.end) { curr = e; next = EVENTS[i+1]||null; break; }
    if (now < e.start) { next = e; curr = EVENTS[i-1]||null; break; }
  }
  if (!curr && !next) curr = EVENTS[EVENTS.length-1];

  let cdHtml = '';
  if (next) {
    const s   = Math.max(0, Math.floor((next.start - now) / 1000));
    const h   = Math.floor(s / 3600);
    const m   = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    cdHtml = `
      <div class="card countdown-card">
        <div class="cd-label">Next in</div>
        <div class="cd-nums">
          <div class="cd-unit"><div class="cd-num">${pad(h)}</div><div class="cd-lbl">hrs</div></div>
          <div class="cd-unit"><div class="cd-num">${pad(m)}</div><div class="cd-lbl">min</div></div>
          <div class="cd-unit"><div class="cd-num">${pad(sec)}</div><div class="cd-lbl">sec</div></div>
        </div>
      </div>`;
  }

  area.innerHTML = `
    <div class="status">
      <div class="prog-row">
        <div class="prog-pct">${pct.toFixed(1)}<sup>%</sup></div>
        <div class="prog-bar-col">
          <div class="prog-track">
            <div class="prog-fill" style="width:${pct.toFixed(2)}%"></div>
          </div>
          <div class="prog-labels"><span>Fri 06:30</span><span>Sun 23:59</span></div>
        </div>
      </div>

      <div class="cards-row">
        ${curr ? `
        <div class="card">
          <div class="card-tag"><span class="live-dot"></span>Now</div>
          <div class="card-icon">${curr.icon}</div>
          <div class="card-name">${curr.name}</div>
          <div class="card-time">${fmtTime(curr.start)}–${fmtTime(curr.end)}</div>
          <div class="card-cryptic">${curr.cryptic}</div>
        </div>` : '<div class="card"></div>'}

        ${next ? `
        <div class="card">
          <div class="card-tag">Up next</div>
          <div class="card-icon">${next.icon}</div>
          <div class="card-name">${next.name}</div>
          <div class="card-time">${fmtShort(next.start)}</div>
          <div class="card-cryptic">${next.cryptic}</div>
        </div>` : '<div class="card"></div>'}

        ${cdHtml}
      </div>
    </div>`;
}

// ━━━ QUOTES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Each entry: { text, part2 (optional, appears after delay) }
const QUOTES = [
  { text: "Abi is a MILF." },
  { text: "Neil told us there are no boundaries." },
  { text: "Talia told us to behave.", part2: "We won't." },
  { text: "Gabi has put too much trust in us." },
  { text: "Hopefully this doesn't make it to the news." },
  { text: "Will Big Shlong Bray make it?", part2: "...probably not." },
  { text: "Eli has been suspiciously quiet about the planning. 🤫" },
  { text: "Mimi said she's definitely not jealous. Definitely." },
  { text: "Yoav is with us in spirit from Israel. (Israel, not Marrakesh.)" },
  { text: "Talia's mum already told Gabi where we're going.", part2: "Cheers for that." },
  { text: "Talia's mum: the real villain of this trip." },
  { text: "The group chat has been muted by at least three people." },
  { text: "Someone will cry. We're not saying who." },
  { text: "Gabi's last weekend of freedom. Use it wisely." },
  { text: "No boundaries. Neil's words, not ours." },
  { text: "Eli: the mischievous one. You've been warned." },
  { text: "What happens in Marrakesh... Gabi's mum will find out." },
  { text: "This trip was Eli's idea. Allegedly." },
  { text: "Yoav sends his regards and his envy. 🇮🇱" },
  { text: "The itinerary is classified. Trust the process." },
  { text: "Gabi thinks this is a normal weekend. Bless him." },
];

let quoteIndex = Math.floor(Math.random() * QUOTES.length);
let quotePart2Timer = null;

function showNextQuote() {
  const el = document.getElementById('quoteEl');
  if (!el) return;

  if (quotePart2Timer) { clearTimeout(quotePart2Timer); quotePart2Timer = null; }

  // Fade out
  el.classList.add('hidden');

  setTimeout(() => {
    const q = QUOTES[quoteIndex % QUOTES.length];
    quoteIndex++;
    el.innerHTML = q.text;
    el.classList.remove('hidden');

    // If there's a part2, append it after a pause
    if (q.part2) {
      quotePart2Timer = setTimeout(() => {
        el.classList.add('hidden');
        setTimeout(() => {
          el.innerHTML = q.text + ' <span class="part2">' + q.part2 + '</span>';
          el.classList.remove('hidden');
        }, 500);
      }, 2200);
    }
  }, 500);
}

// Start quote cycle — each quote + part2 gets ~5s total, then next
function scheduleNextQuote(q) {
  const delay = q.part2 ? 6500 : 4500;
  setTimeout(() => {
    showNextQuote();
    scheduleNextQuote(QUOTES[quoteIndex % QUOTES.length]);
  }, delay);
}

// Kick off
showNextQuote();
scheduleNextQuote(QUOTES[quoteIndex % QUOTES.length]);

// ━━━ INIT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
if (new Date() >= REVEAL_TIME) {
  revealed = true;
  buildTiles(DESTINATION);
  tiles.forEach((t,i) => { if(t){t.el.className='tile locked'; t.charEl.textContent=DESTINATION[i]||' ';} });
  document.getElementById('boardRow').classList.add('revealed');
  document.getElementById('boardSub').textContent = 'Destination';
  document.getElementById('emoji').textContent = '🐪';
  document.title = 'Operation Marrakesh 🐪';
} else {
  showCity(CITIES[cityIndex]);
  phaseTimer = setTimeout(() => startScramble(nextCity), HOLD_MS);
  setInterval(() => { if (!revealed && new Date() >= REVEAL_TIME) revealDestination(); }, 1000);
}

renderStatus();
setInterval(renderStatus, 1000);
</script>
