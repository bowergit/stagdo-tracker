<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Operation ???</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a96e;
  --gold-bright: #e8c88a;
  --gold-dim: #7a5d2e;
  --bg: #080808;
  --surface: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
  --text: #f0ead6;
  --muted: #aaa;
}

html { min-height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  position: relative;
  padding-bottom: 28px;
}

/* ambient glow */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 100vw;
  height: 60vh;
  background: radial-gradient(ellipse at center top, rgba(201,169,110,0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ━━━━ HERO ━━━━ */
.hero {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 16px 6px;
  position: relative;
  z-index: 1;
  gap: 3px;
}

.op-label {
  font-size: clamp(0.85rem, 4vw, 1.1rem);
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
  font-weight: 700;
}

.big-emoji {
  font-size: clamp(2.6rem, 11vw, 3.8rem);
  line-height: 1;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  display: block;
  text-align: center;
  margin: 2px 0 1px;
  filter: drop-shadow(0 4px 16px rgba(201,169,110,0.2));
}

.big-emoji.pop {
  transform: scale(1.25) rotate(-8deg);
}

/* ── Board ── */
.board-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: fit-content;
  max-width: 92vw;
}

.board-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 7px 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: box-shadow 0.6s ease, border-color 0.6s ease;
  width: fit-content;
}

.board-row.revealed {
  box-shadow: 0 8px 40px rgba(201,169,110,0.2), 0 0 80px rgba(201,169,110,0.08);
  border-color: rgba(201,169,110,0.25);
}

.board-dest-label {
  font-size: clamp(0.7rem, 2.8vw, 0.85rem);
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  white-space: nowrap;
  text-align: center;
  margin-bottom: 2px;
}

.board-tiles {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
}

.board-tiles-row {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 3px;
  justify-content: center;
}

.tile {
  width: clamp(28px, 7.5vw, 38px);
  height: clamp(44px, 11vw, 56px);
  background: #101010;
  border-radius: 7px;
  border: 1px solid #1c1c1c;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 -2px 5px rgba(0,0,0,0.5);
  transition: border-color 0.4s, box-shadow 0.4s;
}

.tile::after {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 1px;
  background: rgba(0,0,0,0.55);
  pointer-events: none;
}

.tile-char {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.2rem, 4.5vw, 1.6rem);
  font-weight: 700;
  color: #e0d8c8;
  line-height: 1;
  transition: color 0.4s ease;
}

.tile.scrambling .tile-char { color: #2a2a2a; }

.tile.locked {
  border-color: rgba(201,169,110,0.25);
  box-shadow: inset 0 -2px 5px rgba(0,0,0,0.5), 0 0 12px rgba(201,169,110,0.15);
}

.tile.locked .tile-char {
  color: var(--gold);
  text-shadow: 0 0 20px rgba(201,169,110,0.6);
}

.board-sub {
  font-size: 0.6rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}

/* ━━━━ DIVIDER ━━━━ */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  flex-shrink: 0;
  margin: 0 16px;
}

/* ━━━━ REVEAL FLASH ━━━━ */
@keyframes flashReveal {
  0%   { opacity: 0; }
  12%  { opacity: 0.7; }
  100% { opacity: 0; }
}
.reveal-flash {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, rgba(201,169,110,0.85), rgba(255,255,255,0.55));
  pointer-events: none; z-index: 300;
  animation: flashReveal 2s ease forwards;
}

/* ━━━━ STATUS ━━━━ */
.status {
  flex: 1 0 auto;
  display: flex;
  flex-direction: column;
  padding: 8px 12px 12px;
  gap: 8px;
  position: relative;
  z-index: 1;
}

/* ━━━━ WEATHER CARD ━━━━ */
.weather-temp {
  font-size: clamp(1.6rem, 7vw, 2.2rem);
  font-weight: 900;
  letter-spacing: -1px;
  color: var(--gold);
  line-height: 1;
  margin: 2px 0 2px;
}
.weather-desc {
  font-size: 0.85rem;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 3px;
}
.weather-detail {
  font-size: 0.72rem;
  color: var(--muted);
}

/* ━━━━ PHOTO CARD ━━━━ */
.photo-btn {
  display: block;
  margin-top: 10px;
  background: linear-gradient(135deg, rgba(201,169,110,0.15), rgba(201,169,110,0.05));
  border: 1px solid rgba(201,169,110,0.3);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--gold);
  font-size: 0.85rem;
  font-weight: 600;
  text-decoration: none;
  text-align: center;
  letter-spacing: 0.5px;
  -webkit-tap-highlight-color: transparent;
}
.photo-btn:active { opacity: 0.7; }

/* Progress row */
.prog-row {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.prog-pct {
  font-size: clamp(2.4rem, 11vw, 3.6rem);
  font-weight: 900;
  letter-spacing: -3px;
  color: var(--text);
  line-height: 1;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.prog-pct sup {
  font-size: 0.4em;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0;
  vertical-align: super;
}

.prog-bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.prog-track {
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  position: relative;
  overflow: visible;
}

.prog-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-bright));
  position: relative;
  transition: width 2s cubic-bezier(0.4,0,0.2,1);
  min-width: 8px;
}

.prog-fill::after {
  content: '';
  position: absolute;
  right: -1px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gold-bright);
  box-shadow: 0 0 12px rgba(201,169,110,0.9), 0 0 28px rgba(201,169,110,0.4);
}

.prog-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* Current + next cards */
.cards-row {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  position: relative;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.card-tag {
  font-size: 0.55rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
}

.live-dot {
  width: 5px; height: 5px;
  background: var(--gold);
  border-radius: 50%;
  flex-shrink: 0;
  animation: blink 1.8s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

/* ━━━━ VIEW TOGGLE ━━━━ */
.view-toggle {
  display: flex;
  gap: 5px;
  background: rgba(0,0,0,0.35);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  flex-shrink: 0;
}
.vt-btn {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 8px 6px;
  border-radius: 9px;
  letter-spacing: 0.5px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s, background 0.2s;
}
.vt-btn.active {
  background: linear-gradient(135deg, rgba(201,169,110,0.28), rgba(201,169,110,0.1));
  color: var(--gold);
  box-shadow: inset 0 0 0 1px rgba(201,169,110,0.35);
}

/* ━━━━ PLAN VIEW ━━━━ */
.plan-scroll { display: flex; flex-direction: column; gap: 4px; }
.plan-day { margin-top: 4px; }
.plan-day-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin: 6px 2px 6px;
}
.plan-day-name {
  font-size: 1rem;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 0.5px;
}
.plan-day-date {
  font-size: 0.62rem;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
.plan-day-sub {
  font-size: 0.58rem;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-left: auto;
  opacity: 0.65;
  text-align: right;
}
.plan-item {
  display: flex;
  gap: 10px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  margin-bottom: 5px;
  align-items: flex-start;
}
.plan-item.locked { opacity: 0.7; }
.redact-bar {
  height: 11px;
  border-radius: 3px;
  background: #000;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
}
.redact-bar.thin { height: 7px; margin-top: 5px; opacity: 0.55; }
.plan-item-icon { font-size: 1.25rem; flex-shrink: 0; line-height: 1.2; }
.plan-item-name { font-size: 0.85rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.plan-item-desc { font-size: 0.7rem; color: #999; font-style: italic; line-height: 1.4; margin-top: 2px; }
.plan-intro {
  text-align: center;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 1px;
  padding: 2px 0 2px;
}

.card-icon { font-size: 1.6rem; line-height: 1; margin-bottom: 6px; flex-shrink: 0; }

.card-name {
  font-size: clamp(0.75rem, 2.8vw, 0.9rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 4px;
  flex-shrink: 0;
}

.card-time {
  font-size: 0.62rem;
  color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 6px;
  flex-shrink: 0;
}

.card-cryptic {
  font-size: 0.75rem;
  color: #999;
  line-height: 1.5;
  font-style: italic;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
}

/* ━━━━ FLYING PLANES ━━━━ */
@keyframes flyAcross {
  0%   { transform: translateX(-80px); opacity: 0; }
  8%   { opacity: 0.7; }
  92%  { opacity: 0.7; }
  100% { transform: translateX(calc(100vw + 80px)); opacity: 0; }
}

.flying-plane {
  position: fixed;
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  animation: flyAcross linear forwards;
  pointer-events: none;
  z-index: 100;
  will-change: transform;
}

/* Countdown card spans full width */
.countdown-card {
  grid-column: 1 / -1;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  flex: 0 0 auto;
}

.cd-label {
  font-size: 0.58rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  flex-shrink: 0;
  writing-mode: initial;
}

.cd-nums {
  display: flex;
  gap: 6px;
  flex: 1;
  justify-content: center;
}

.cd-unit {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.05);
  padding: 8px 4px 6px;
  text-align: center;
}

.cd-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.4rem, 6vw, 2rem);
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}

.cd-lbl {
  font-size: 0.5rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 3px;
}

/* Pre-trip / post-trip fullscreen */
.full-state {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 16px;
  gap: 6px;
  position: relative;
  z-index: 1;
}

.pre-label {
  font-size: 0.65rem;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--muted);
}

.pre-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(2rem, 10vw, 3rem);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: -2px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.pre-hint {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-align: center;
}

/* ━━━━ QUOTE STRIP ━━━━ */
.quote-strip {
  flex: 0 0 auto;
  padding: 5px 16px;
  text-align: center;
  position: relative;
  z-index: 1;
  min-height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.quote-text {
  font-size: clamp(0.78rem, 3.2vw, 0.9rem);
  color: #bbb;
  font-style: italic;
  line-height: 1.4;
  transition: opacity 0.5s ease;
  max-width: 340px;
}

.quote-text.hidden { opacity: 0; }

.quote-text .part2 {
  color: var(--gold);
  font-style: normal;
  font-weight: 600;
}

.footer {
  flex-shrink: 0;
  text-align: center;
  font-size: 0.55rem;
  color: #444;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 0 4px;
  z-index: 1;
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="op-label">Operation Chaos ✈️</div>
  <div class="big-emoji" id="emoji">🐪</div>
  <div class="board-wrap">
    <div class="board-dest-label" id="boardSub">Destination</div>
    <div class="board-row" id="boardRow">
      <div class="board-tiles" id="boardTiles"></div>
    </div>
  </div>
  <div style="font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:#444;margin-top:2px;">Gabi's Stag Do · June 2026</div>
</div>

<div class="divider"></div>

<!-- Quote strip -->
<div class="quote-strip">
  <div class="quote-text" id="quoteEl"></div>
</div>

<div class="divider"></div>

<!-- Status (injected) -->
<div id="statusArea"></div>

<div class="footer" id="footer"></div>

const CITIES = [
  'PARIS','MADRID','ROME','BERLIN','AMSTERDAM','LISBON','VIENNA',
  'PRAGUE','WARSAW','BUDAPEST','ATHENS','STOCKHOLM','COPENHAGEN',
  'OSLO','HELSINKI','DUBLIN','ZURICH','BARCELONA','MILAN','ISTANBUL',

// ━━━ BOARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let tiles = [];

let emojiIndex = 0;
let revealed = false;
let phaseTimer = null;
let scrambleRAF = null;
let scrambleStart = null;

function rc() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }

function buildTiles(city) {
  const lines = Array.isArray(city) ? city : [city];
  const container = document.getElementById('boardTiles');
  container.innerHTML = '';
  tiles = [];

  // Size tiles to fit longest line
  const maxLen = Math.max(...lines.map(l => l.replace(/ /g, '').length));
  const usable = Math.min(window.innerWidth - 64, 340);
  const tileW = Math.max(20, Math.min(36, Math.floor((usable - 3 * (maxLen - 1)) / maxLen)));
  const tileH = Math.floor(tileW * 1.55);
  const fs = Math.max(0.85, tileW * 0.046) + 'rem';

  lines.forEach(word => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'board-tiles-row';
    for (let i = 0; i < word.length; i++) {
      if (word[i] === ' ') {
        const sp = document.createElement('div'); sp.style.width = '6px'; rowDiv.appendChild(sp);
        tiles.push(null); continue;
      }
      const t = document.createElement('div');
      t.className = 'tile';
      t.style.width = tileW + 'px'; t.style.height = tileH + 'px';
      const c = document.createElement('span');
      c.className = 'tile-char'; c.style.fontSize = fs; c.textContent = word[i];
      t.appendChild(c); rowDiv.appendChild(t);
      tiles.push({ el: t, charEl: c });
    }
    container.appendChild(rowDiv);
  });
}

function showCity(city) {
  buildTiles(city);
  // Emoji pop animation
  const e = document.getElementById('emoji');
  const newEmoji = EMOJIS[emojiIndex % EMOJIS.length];
  e.textContent = newEmoji;
  e.classList.remove('pop');
  requestAnimationFrame(() => requestAnimationFrame(() => e.classList.add('pop')));
  setTimeout(() => e.classList.remove('pop'), 400);
  emojiIndex++;
}

function scrambleTick(progress) {
  tiles.forEach(t => {
    if (!t) return;
    if (Math.random() > progress * 0.5) {
      t.el.className = 'tile scrambling';
      t.charEl.textContent = rc();
    }
  });
}

function startScramble(cb) {
  scrambleStart = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - scrambleStart) / SCRAMBLE_MS);
    scrambleTick(p);
    if (p < 1) { scrambleRAF = requestAnimationFrame(frame); }
    else { scrambleRAF = null; cb(); }
  }
  scrambleRAF = requestAnimationFrame(frame);
}

function nextCity() {
  cityIndex = (cityIndex + 1) % CITIES.length;
  showCity(CITIES[cityIndex]);
  phaseTimer = setTimeout(() => startScramble(nextCity), HOLD_MS);
}

function revealDestination() {
  if (revealed) return;
  revealed = true;
  clearTimeout(phaseTimer);
  if (scrambleRAF) cancelAnimationFrame(scrambleRAF);

  // Rush scramble then settle letter by letter
  let n = 0;
  const rush = setInterval(() => {
    buildTiles(DESTINATION); // rebuild to exact length
    tiles.forEach(t => { if (t) { t.el.className='tile scrambling'; t.charEl.textContent=rc(); }});
    if (++n >= 14) {
      clearInterval(rush);
      for (let i = 0; i < DESTINATION.length; i++) {
        setTimeout(() => {
          if (!tiles[i]) return;
          tiles[i].charEl.textContent = DESTINATION[i];
          tiles[i].el.className = 'tile';
          setTimeout(() => { tiles[i].el.className = 'tile locked'; }, 80);
        }, i * 110);
      }
      setTimeout(() => {
        document.getElementById('boardRow').classList.add('revealed');
        document.getElementById('boardSub').textContent = 'Destination';
        document.getElementById('emoji').textContent = '🐪';
        document.title = 'Operation Marrakesh 🐪';

        // Flash
        const flash = document.createElement('div');
        flash.className = 'reveal-flash';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 2500);

        // Confetti bursts
        const fire = (opts) => confetti(Object.assign({ zIndex: 400, disableForReducedMotion: true }, opts));
        fire({ particleCount: 120, spread: 80, origin: { y: 0.35 }, colors: ['#c9a96e','#e8c88a','#fff','#ff9f43','#ffeaa7'] });
        setTimeout(() => fire({ particleCount: 80, spread: 100, origin: { x: 0.1, y: 0.5 }, angle: 60, colors: ['#c9a96e','#fff','#fdcb6e'] }), 400);
        setTimeout(() => fire({ particleCount: 80, spread: 100, origin: { x: 0.9, y: 0.5 }, angle: 120, colors: ['#c9a96e','#fff','#fdcb6e'] }), 400);
        setTimeout(() => fire({ particleCount: 60, spread: 120, origin: { y: 0.3 }, colors: ['#c9a96e','#e8c88a','#fff'] }), 900);

        // Vibrate
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
      }, DESTINATION.length * 110 + 250);
    }
  }, 55);
}

// ✈️ base points NE → rotateDeg = 45 + atan2(dy,dx) points it along its path.
function randEdgePoint(edge, W, H, m) {
  if (edge === 'L') return { x: -m,   y: (0.05 + Math.random() * 0.9) * H };
  if (edge === 'R') return { x: W+m,  y: (0.05 + Math.random() * 0.9) * H };
  if (edge === 'T') return { x: (0.05 + Math.random() * 0.9) * W, y: -m };
                    return { x: (0.05 + Math.random() * 0.9) * W, y: H+m };
}

function spawnPlane() {
  const W = window.innerWidth, H = window.innerHeight, M = 80;
  // Weighted: L→R most common, others less so
  const startEdges = ['L','L','L','R','R','T','B'];
  const startEdge  = startEdges[Math.floor(Math.random() * startEdges.length)];
  const others     = ['L','R','T','B'].filter(e => e !== startEdge);
  const endEdge    = others[Math.floor(Math.random() * others.length)];

  const s = randEdgePoint(startEdge, W, H, M);
  const e = randEdgePoint(endEdge,   W, H, M);
  const angleDeg  = Math.atan2(e.y - s.y, e.x - s.x) * 180 / Math.PI;
  const rotateDeg = 45 + angleDeg;
  const duration  = (3.2 + Math.random() * 3.5) * 1000;

  const plane = document.createElement('div');
  plane.textContent = '✈️';
  Object.assign(plane.style, {
    position: 'fixed', top: 0, left: 0,
    fontSize: `${1.1 + Math.random() * 0.7}rem`,
    pointerEvents: 'none', zIndex: '100',
  });
  document.body.appendChild(plane);

  plane.animate([
    { transform: `translate(${s.x}px,${s.y}px) rotate(${rotateDeg}deg)`, opacity: 0 },
    { transform: `translate(${s.x+(e.x-s.x)*.06}px,${s.y+(e.y-s.y)*.06}px) rotate(${rotateDeg}deg)`, opacity: 0.75, offset: 0.06 },
    { transform: `translate(${s.x+(e.x-s.x)*.94}px,${s.y+(e.y-s.y)*.94}px) rotate(${rotateDeg}deg)`, opacity: 0.75, offset: 0.94 },
    { transform: `translate(${e.x}px,${e.y}px) rotate(${rotateDeg}deg)`, opacity: 0 },
  ], { duration, fill: 'forwards', easing: 'linear' });

  setTimeout(() => plane.remove(), duration + 600);
  // Short interval = multiple planes in the air at once
  setTimeout(spawnPlane, 1200 + Math.random() * 2500);
}
// Stagger 3 initial planes so screen isn't empty at load
setTimeout(spawnPlane, 500);
setTimeout(spawnPlane, 1800);
setTimeout(spawnPlane, 3200);
</script>
</body>
